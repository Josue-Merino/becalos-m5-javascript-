<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Manejo de Formularios</title>
</head>
<body>
    <h1 class="title">Registro de Evento</h1>
    <main class="content">
        <div class="container">
            <form id="registroEvento" class="form">
                <div class="field">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez">
                </div>
            
                <div class="field">
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com">
                </div>

                <div class="field">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ej. 55 1234 5678">
                </div>

                <label>Intereses:</label>
                <label><input type="checkbox" name="intereses" value="tecnología"> Tecnología</label>
                <label><input type="checkbox" name="intereses" value="negocios"> Negocios</label>
                <label><input type="checkbox" name="intereses" value="arte"> Arte</label>

                <label>Horario preferido:</label>
                <label><input type="radio" name="horario" value="mañana"> Mañana</label>
                <label><input type="radio" name="horario" value="tarde"> Tarde</label>
                <label><input type="radio" name="horario" value="noche"> Noche</label>

                <div class="field">
                    <label for="fecha">Fecha del evento:</label>
                    <input type="date" id="fecha" name="fecha">
                </div>  
                
                <div class="field">
                    <label for="hora">Hora preferida:</label>
                    <input type="time" id="hora" name="hora">
                </div>
               
                <button type="submit" class="btn" disabled>Registrarse</button>
            </form>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>

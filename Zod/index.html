<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Manejo de Formularios</title>
</head>
<body>
    <h1 class="title">Validación con Zod</h1>
    <main class="content">
        <div class="container">
            <form id="registroEvento" class="form">
                <div class="field">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez">
                </div>
            
                <div class="field">
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com">
                </div>

                <div class="field">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="*********">
                </div>
               
                <button type="submit" class="btn" disabled>Registrarse</button>
            </form>
        </div>
    </main>
   <script src="app.js" type="module"></script>
</body>
    
   
</html>
